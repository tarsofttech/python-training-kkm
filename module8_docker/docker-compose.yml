version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  fastapi-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-rag-app
    ports:
      - "8000:8000"
    volumes:
      - faiss-index:/app/data/index
      - uploaded-docs:/app/data/uploads
    env_file:
      - .env
    networks:
      - rag-network
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ollama-models:
    name: ollama-models
  faiss-index:
    name: faiss-index
  uploaded-docs:
    name: uploaded-docs

networks:
  rag-network:
    name: rag-network
    driver: bridge
